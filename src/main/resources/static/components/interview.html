<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HireIQ - Interview Questions</title>
    <link rel="stylesheet" href="/css/global.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding: 24px;
            background: var(--gradient-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
        }

        .header-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            background: var(--gradient-primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-sm);
        }

        .page-header h1 {
            margin-bottom: 4px;
            font-size: 28px;
            color: var(--text-primary);
        }

        .page-header p {
            margin-bottom: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .controls-section {
            background: var(--gradient-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-group input {
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            background: var(--bg-input);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: var(--shadow-glow);
        }

        .button-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .inline-msg {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 12px;
        }

        .inline-msg.error {
            color: var(--accent-red);
        }

        .inline-msg.success {
            color: var(--accent-green);
        }

        .questions-container {
            margin-top: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--accent-primary);
        }

        .question-item {
            padding: 20px;
            background: var(--gradient-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }

        .question-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .question-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent-blue);
        }

        .question-item:hover::before {
            opacity: 1;
        }

        .question-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--gradient-primary);
            color: white;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 700;
            margin-right: 12px;
            box-shadow: var(--shadow-sm);
        }

        .question-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .question-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            font-weight: 500;
        }

        .question-meta {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .difficulty-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .difficulty-badge.easy {
            background: rgba(34, 197, 94, 0.12);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .difficulty-badge.medium {
            background: rgba(251, 191, 36, 0.14);
            color: var(--accent-orange);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .difficulty-badge.hard {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .action-buttons {
            margin-top: 16px;
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            color: var(--accent-primary);
        }

        /* ── Delete button variant ── */
        .action-btn.delete-btn {
            color: var(--accent-red);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .action-btn.delete-btn:hover {
            background: rgba(239, 68, 68, 0.08);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .action-btn.delete-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-item {
            animation: fadeIn 0.4s ease-out;
        }

        /* Slide-out animation on delete */
        .question-item.removing {
            animation: slideOut 0.3s ease-out forwards;
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); max-height: 300px; }
            to   { opacity: 0; transform: translateX(40px); max-height: 0; padding: 0; margin: 0; }
        }
    </style>
</head>
<body>

<div class="page-content">
    <div class="page-header">
        <div class="header-icon"><i class='bx bx-question-mark'></i></div>
        <div>
            <h1>Interview Question Generator</h1>
            <p style="color:var(--text-secondary); margin-bottom:0; font-size:13px;">
                Step 6 in hiring flow. Enter Job ID and Candidate ID to generate targeted interview questions.
            </p>
        </div>
    </div>

    <div class="card">
        <div class="controls-grid">
            <div>
                <label style="display:block; font-size:13px; margin-bottom:6px;">Job <span style="color:var(--accent-red)">*</span></label>
                <select id="jobId" onchange="loadCandidates()">
                    <option value="">-- Select a job --</option>
                </select>
            </div>
            <div>
                <label style="display:block; font-size:13px; margin-bottom:6px;">Candidate <span style="color:var(--accent-red)">*</span></label>
                <select id="candidateId">
                    <option value="">-- Select a candidate --</option>
                </select>
            </div>
        </div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button onclick="generateQuestions()" id="generateBtn">Generate Questions</button>
            <button onclick="loadSaved()" class="btn btn-secondary">Load Saved</button>
            <span id="generateMsg" style="font-size:13px;"></span>
        </div>
        <p id="fieldMsg" class="inline-msg"></p>
        <p style="font-size:12px; color:#64748b; margin-top:6px;">
            Candidate must be scored first on the Rankings page before questions can be generated.
        </p>
    </div>

    <div id="questionsOutput" style="display:none;">
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-bottom:12px;">
            <button onclick="copyAll()" class="btn btn-primary">Copy All</button>
            <button onclick="downloadAll()" class="btn btn-secondary">Download</button>
        </div>

        <div id="missingSkillsSection" style="display:none;" class="card">
            <h2 style="margin-bottom:16px;">Missing Skills Questions</h2>
            <div id="missingSkillsList"></div>
        </div>

        <div id="weakExperienceSection" style="display:none;" class="card">
            <h2 style="margin-bottom:16px;">Weak Experience Questions</h2>
            <div id="weakExperienceList"></div>
        </div>

        <div id="redFlagsSection" style="display:none;" class="card">
            <h2 style="margin-bottom:16px;">Red Flag Questions</h2>
            <div id="redFlagsList"></div>
        </div>
    </div>
</div>

<script src="/js/navbar.js"></script>
<script src="/js/interview.js"></script>
<script>
    /**
     * Deletes a single question by ID.
     * Calls DELETE /api/interview/questions/{id}
     * On success, animates the card out and removes it from the DOM.
     * If the section becomes empty, hides the section header too.
     */
    function deleteQuestion(id, buttonEl) {
        if (!confirm('Delete this question?')) return;

        buttonEl.disabled = true;
        buttonEl.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i> Deleting...';

        fetch(`/api/interview/questions/${id}`, { method: 'DELETE' })
            .then(res => {
                if (res.ok) {
                    // Animate the card out then remove it
                    const card = document.getElementById(`question-card-${id}`);
                    if (card) {
                        card.classList.add('removing');
                        card.addEventListener('animationend', () => {
                            const parentList = card.parentElement;
                            card.remove();

                            // Hide the section if no questions remain
                            if (parentList && parentList.children.length === 0) {
                                const section = parentList.closest('.card');
                                if (section) section.style.display = 'none';
                            }

                            // Hide the whole output area if all sections are gone
                            const output = document.getElementById('questionsOutput');
                            const visibleSections = output.querySelectorAll(
                                '#missingSkillsSection, #weakExperienceSection, #redFlagsSection'
                            );
                            const anyVisible = Array.from(visibleSections)
                                .some(s => s.style.display !== 'none');
                            if (!anyVisible) output.style.display = 'none';
                        });
                    }
                } else {
                    res.json().then(data => {
                        alert(data.error || 'Failed to delete question.');
                        buttonEl.disabled = false;
                        buttonEl.innerHTML = '<i class="bx bx-trash"></i> Delete';
                    });
                }
            })
            .catch(() => {
                alert('Network error. Please try again.');
                buttonEl.disabled = false;
                buttonEl.innerHTML = '<i class="bx bx-trash"></i> Delete';
            });
    }
</script>
</body>
</html>
