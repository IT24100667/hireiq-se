<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HireIQ – Pipeline</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        .page-header {
            display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
        }
        .page-header .header-icon {
            width: 44px; height: 44px; border-radius: var(--radius-md);
            background: var(--gradient-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
        }
        .page-header div h1 { margin-bottom: 2px; }
        .page-header div p  { margin-bottom: 0; }

        .board {
            display: flex;
            gap: 16px;
            padding: 0;
            min-height: calc(100vh - 260px);
            width: 100%;
            justify-content: space-between;
        }
        .column {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            min-width: 240px;
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .column-header {
            padding: 14px 18px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .col-SCREENED    .column-header { background: rgba(77, 166, 255, 0.08); color: var(--accent-blue); border-left: 4px solid var(--accent-blue); }
        .col-INTERVIEWED .column-header { background: rgba(253, 203, 110, 0.08); color: var(--accent-orange); border-left: 4px solid var(--accent-orange); }
        .col-OFFERED     .column-header { background: rgba(85, 239, 196, 0.08); color: var(--accent-green); border-left: 4px solid var(--accent-green); }
        .col-HIRED       .column-header { background: rgba(108, 92, 231, 0.08); color: var(--accent-primary); border-left: 4px solid var(--accent-primary); }

        .count-badge {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .cards-container {
            padding: 12px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 65vh;
        }
        .candidate-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 14px;
            transition: all var(--transition-fast);
        }
        .candidate-card:hover {
            border-color: var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .card-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 4px;
            cursor: pointer;
        }
        .card-name:hover { color: var(--accent-primary); }
        .card-meta  { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; }
        .card-score {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .score-high { background: rgba(85, 239, 196, 0.12); color: var(--accent-green); }
        .score-mid  { background: rgba(253, 203, 110, 0.12); color: var(--accent-orange); }
        .score-low  { background: rgba(255, 107, 107, 0.12); color: var(--accent-red); }
        .card-since { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 10px; }
        .card-actions { display: flex; gap: 6px; align-items: center; }
        .btn-arrow {
            width: 32px; height: 32px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: all var(--transition-fast);
        }
        .btn-arrow:hover:not(:disabled) {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(108, 92, 231, 0.08);
            transform: none;
            box-shadow: none;
        }
        .btn-next {
            background: var(--gradient-primary);
            color: white;
            border: none;
        }
        .btn-next:hover:not(:disabled) {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 2px 10px rgba(108, 92, 231, 0.3);
        }
        .btn-next:disabled, .btn-prev:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .stage-label { flex: 1; text-align: center; font-size: 0.68rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .empty-col { text-align: center; color: var(--text-dim); padding: 32px 0; font-size: 0.82rem; }
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }

        .controls-row {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;
        }
        .controls-row select { max-width: 300px; }

        #addPanel {
            display: none; padding: 16px;
            background: rgba(85, 239, 196, 0.05);
            border: 1px solid rgba(85, 239, 196, 0.2);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            gap: 14px; align-items: center; flex-wrap: wrap;
        }
        #addPanel.open { display: flex; }
        #addPanel select, #addPanel input {
            max-width: 220px;
        }
        #addPanel label { margin-bottom: 0; text-transform: none; }

        .inline-msg {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .inline-msg.error {
            color: var(--accent-red);
        }
        .btn-email {
            width: 100%;
            margin-top: 8px;
            padding: 7px 12px;
            background: rgba(85,239,196,0.10);
            border: 1px solid rgba(85,239,196,0.35);
            border-radius: var(--radius-sm);
            color: var(--accent-green);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
        }
        .btn-email:hover {
            background: rgba(85,239,196,0.22);
            border-color: var(--accent-green);
            box-shadow: 0 2px 8px rgba(85,239,196,0.15);
        }

        /* Interview invite button - blue */
        .btn-email-interview {
            background: rgba(99,179,237,0.12);
            border-color: rgba(99,179,237,0.4);
            color: #63b3ed;
        }
        .btn-email-interview:hover {
            background: rgba(99,179,237,0.25);
            border-color: #63b3ed;
            box-shadow: 0 2px 8px rgba(99,179,237,0.2);
        }

        /* Rejection button - red */
        .btn-email-rejection {
            background: rgba(252,129,129,0.12);
            border-color: rgba(252,129,129,0.4);
            color: #fc8181;
        }
        .btn-email-rejection:hover {
            background: rgba(252,129,129,0.25);
            border-color: #fc8181;
            box-shadow: 0 2px 8px rgba(252,129,129,0.2);
        }

        /* Offer button - green (inherits base .btn-email) */
        .btn-email-offer {
            background: rgba(85,239,196,0.12);
            border-color: rgba(85,239,196,0.4);
            color: #55efc4;
        }
        .btn-email-offer:hover {
            background: rgba(85,239,196,0.25);
            border-color: #55efc4;
            box-shadow: 0 2px 8px rgba(85,239,196,0.2);
        }

        /* Remove candidate button */
        .btn-remove {
            width: 100%;
            margin-top: 6px;
            padding: 6px 12px;
            background: rgba(192,57,43,0.10);
            border: 1px solid rgba(192,57,43,0.35);
            border-radius: var(--radius-sm);
            color: #e74c3c;
            font-size: 0.76rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
        }
        .btn-remove:hover {
            background: rgba(192,57,43,0.22);
            border-color: #e74c3c;
            box-shadow: 0 2px 8px rgba(192,57,43,0.2);
        }
    </style>
</head>
<body>

<div id="navbar-container"></div>

<div style="max-width:1400px; margin:0 auto; padding:24px 20px; animation: fadeInUp 0.4s ease;">

    <div class="page-header">
        <div class="header-icon"><i class='bx bx-columns'></i></div>
        <div>
            <h1>Hiring Pipeline</h1>
            <p style="color: var(--text-secondary); font-size: 13px;">Step 5 in hiring flow. 1) Select Job 2) Load Board 3) Move candidates with arrow buttons.</p>
        </div>
    </div>

    <!-- Job selector row -->
    <div class="controls-row">
        <select id="jobSelect">
            <option value="">-- Select a job --</option>
        </select>
        <button onclick="loadBoard()">
            <i class='bx bx-refresh'></i> Load Board
        </button>
        <button onclick="toggleAddPanel()" class="btn-success" style="margin-left:auto;">
            <i class='bx bx-plus'></i> Add Candidate
        </button>
    </div>
    <div id="kanbanInlineMsg" class="inline-msg"></div>

    <!-- Hidden panel to manually add a candidate -->
    <div id="addPanel">
        <label>Candidate:</label>
        <select id="addCandidateSelect">
            <option value="">-- Select candidate --</option>
        </select>
        <button onclick="addCandidate()" class="btn-success">
            <i class='bx bx-check'></i> Add to Pipeline
        </button>
        <button onclick="toggleAddPanel()" class="btn-secondary">
            <i class='bx bx-x'></i> Cancel
        </button>
    </div>

    <!-- Kanban board -->
    <div class="board" id="board">
        <div class="loading">Select a job and click Load Board</div>
    </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script src="/js/navbar.js"></script>
<script src="/js/kanban.js"></script>

</body>
</html>
