<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireIQ - Login</title>
    <link rel="stylesheet" href="/css/global.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/images/login.jpg') center center / cover no-repeat !important;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 15, 30, 0.55);
            z-index: 0;
        }



        .login-card {
            width: min(420px, 92vw);
            background: var(--gradient-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px 32px;
            position: relative;
            z-index: 1;
            border: 1px solid var(--border-light);
            transition: all var(--transition-normal);
        }

        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            width: 60px;
            height: 60px;
            background: var(--accent-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: var(--shadow-md);
        }

        .login-icon i {
            font-size: 28px;
            color: #ffffff;
        }

        .login-title {
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 700;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 0;
        }

        .login-row {
            margin-bottom: 20px;
        }

        .login-row label {
            display: block;
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .login-row input {
            width: 100%;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-fast);
        }

        .login-row input:focus {
            border-color: var(--accent-blue);
            box-shadow: var(--shadow-glow);
        }

        .login-btn {
            width: 100%;
            margin-top: 12px;
            background: var(--accent-primary);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            padding: 14px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.12);
            transition: left var(--transition-normal);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            background: var(--accent-secondary);
        }

        .login-msg {
            display: none;
            margin-top: 16px;
            font-size: 14px;
            color: var(--accent-red);
            text-align: center;
            padding: 12px;
            border-radius: var(--radius-md);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .login-msg.success {
            color: var(--accent-green);
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
        }

        .seed-users {
            margin-top: 24px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
        }

        .seed-users strong {
            color: var(--text-secondary);
            display: block;
            margin-bottom: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class='bx bx-brain'></i>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to your HireIQ account</p>
        </div>

        <form method="post" action="/login">
            <div class="login-row">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="login-row">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button class="login-btn" type="submit">Sign In</button>
        </form>

        <div class="login-msg" id="loginMsg"></div>

<!--        <div class="seed-users">-->
<!--            <strong>Default Users for First Run</strong>-->
<!--            admin / admin123<br>-->
<!--            hr / hr12345<br>-->
<!--            user / user12345-->
<!--        </div>-->
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const loginMsg = document.getElementById('loginMsg');
        if (params.has('error')) {
            loginMsg.textContent = 'Invalid username or password.';
            loginMsg.style.display = 'block';
        } else if (params.has('logout')) {
            loginMsg.textContent = 'You have been logged out successfully.';
            loginMsg.classList.add('success');
            loginMsg.style.display = 'block';
        }
    </script>
</body>

</html>
