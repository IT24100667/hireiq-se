<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireIQ - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 18px;
        }

        @media (max-width: 900px) {
            .admin-grid { grid-template-columns: 1fr; }
        }

        .pill {
            margin-bottom: 8px;
        }

        .state-badge {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        .state-badge.active   { background: #dcfce7; color: #166534; }
        .state-badge.disabled { background: #fee2e2; color: #991b1b; }
        .state-badge.inactive { background: #f3f4f6; color: #6b7280; }

        .inline-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: end;
        }

        .inline-form label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .inline-form input,
        .inline-form select {
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 9px 10px;
            min-width: 170px;
        }

        /* Masked key display */
        .key-mask {
            font-family: monospace;
            color: var(--text-muted);
            font-size: 12px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            margin-right: 4px;
        }

        .btn-activate { background: #dcfce7; color: #166534; }
        .btn-delete   { background: #fee2e2; color: #991b1b; }
        .btn-edit     { background: #eef2ff; color: #4338ca; }
    </style>
</head>
<body>
<div class="page-content">
    <div class="page-header">
        <div class="header-icon"><i class='bx bx-cog'></i></div>
        <div>
            <span class="page-eyebrow">Control center</span>
            <h1>Admin Dashboard</h1>
            <p>Manage accounts, roles, and AI provider settings from one place.</p>
        </div>
    </div>

    <!-- ── Row 1: User Management ─────────────────────────────────────────── -->
    <div class="admin-grid">
        <div class="card">
            <span class="pill">Team Management</span>
            <h2 style="margin-bottom: 10px;">Create account</h2>
            <form class="inline-form" id="createUserForm">
                <div>
                    <label for="newUsername">Username</label>
                    <input id="newUsername" required>
                </div>
                <div>
                    <label for="newPassword">Password</label>
                    <input id="newPassword" type="password" required>
                </div>
                <div>
                    <label for="newRole">Role</label>
                    <select id="newRole">
                        <option value="HR">HR</option>
                        <option value="USER">USER</option>
                    </select>
                </div>
                <button type="submit">Create</button>
            </form>
            <p id="createMsg" style="font-size: 13px; margin-top: 10px;"></p>
        </div>
